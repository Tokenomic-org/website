<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>{% if page.title %}{{ page.title }} - Tokenomic{% else %}Tokenomic - Advance Your Decentralized Finance Expertise{% endif %}</title>
        {% if page.layout == 'article' %}
        <link href="/assets/css/article.css" rel="stylesheet" />
        <meta property="og:title" content="{{ page.title }}">
        <meta property="og:type" content="article">
        <meta property="og:url" content="https://tokenomic.org/articles/{{ page.slug }}">
        {% if page.featured_image %}<meta property="og:image" content="https://tokenomic.org{{ page.featured_image }}">{% endif %}
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="{{ page.title }}">
        <link rel="alternate" type="application/rss+xml" title="Tokenomic RSS Feed" href="/feed.xml" />
        {% endif %}
        <link href="/assets/css/bootstrap.css" rel="stylesheet" />
        <link href="/assets/css/style.css" rel="stylesheet" />
        <link href="/assets/css/responsive.css" rel="stylesheet" />
        <link rel="shortcut icon" href="/assets/images/favicon.png" type="image/x-icon" />
        <link rel="icon" href="/assets/images/favicon.png" type="image/x-icon" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=2.0,minimum-scale=1.0" />
        <!--[if lt IE 9]><script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.js"></script><![endif]-->
        <!--[if lt IE 9]><script src="/assets/js/respond.js"></script><![endif]-->
        {% include google_analytics.html %}
    </head>
    <body>
        <div class="page-wrapper">
            {% if site.preloader %}
            <div class="preloader">
                <div class="spinner">
                    <div class="inner">
                        <div class="disc"></div>
                        <div class="disc"></div>
                        <div class="disc"></div>
                    </div>
                </div>
            </div>
            {% endif %}
            {{ content }}
            {% include footer.html %}
        </div>
        <div class="scroll-to-top scroll-to-target" data-target="html"><span class="flaticon-up-arrow"></span></div>
        <script src="/assets/js/jquery.js"></script>
        <script src="/assets/js/popper.min.js"></script>
        <script src="/assets/js/bootstrap.min.js"></script>
        <script src="/assets/js/jquery-ui.js"></script>
        <script src="/assets/js/jquery.fancybox.js"></script>
        <script src="/assets/js/owl.js"></script>
        <script src="/assets/js/scrollbar.js"></script>
        <script src="/assets/js/knob.js"></script>
        <script src="/assets/js/paroller.js"></script>
        <script src="/assets/js/tilt.js"></script>
        <script src="/assets/js/isotope.js"></script>
        <script src="/assets/js/appear.js"></script>
        <script src="/assets/js/wow.js"></script>
        <script src="/assets/js/simple-jekyll-search.min.js"></script>
        <script src="/assets/js/element-in-view.js"></script>
        <script src="/assets/js/custom-script.js"></script>
        {% include env.html %}
        <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
        <script src="/shared/assets/js/web3-wallet.js"></script>
        <script src="/shared/assets/js/web3-assets.js"></script>
        <script type="module" src="/shared/assets/js/web3-bundle.js"></script>
        <script src="/shared/assets/js/web3-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="/shared/assets/js/supabase-client.js"></script>
        <script src="/shared/assets/js/profile-photo.js"></script>
        <script src="/shared/assets/js/site-search.js"></script>
    </body>
</html>
