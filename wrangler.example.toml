################################################################
# Cloudflare Workers configuration for Tokenomic
#
# Two Workers deployed as separate [env.<name>] environments:
#   - api-worker   (comments + dashboard + Cloudflare Stream uploads, KV-backed)
#   - web3-worker  (read-only on-chain proxy)
#
# Deploy:
#   wrangler deploy --env api-worker
#   wrangler deploy --env web3-worker
################################################################

name = "tokenomic-workers-root"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# ---------- api-worker ----------
[env.api-worker]
name = "tokenomic-api"
main = "workers/api-worker/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[env.api-worker.observability]
enabled = true
head_sampling_rate = 1

[env.api-worker.vars]
# First-party origins only. Do NOT add https://*.pages.dev, https://*.replit.dev,
# https://*.repl.co, or https://*.workers.dev — those are multi-tenant and would
# let any attacker-controlled subdomain make credentialed CORS requests with the
# victim's tk_session cookie. List explicit staging hostnames if needed.
ALLOWED_ORIGINS              = "https://tokenomic.org,https://www.tokenomic.org,https://*.tokenomic.org,https://tokenomic.guillaumelauzier.workers.dev,http://localhost:5000,http://127.0.0.1:5000"
MAX_COMMENT_LEN              = "4000"
REQUIRE_WALLET               = "false"
CF_ACCOUNT_ID                = "c016d64a9a4f4a2900fb3385bd08144f"
STREAM_CUSTOMER_SUBDOMAIN    = ""    # e.g. customer-abc123.cloudflarestream.com (set after first Stream upload)
STREAM_MAX_DURATION_SECONDS  = "21600"
STREAM_ALLOWED_ORIGINS       = "https://tokenomic.org,https://tokenomic.guillaumelauzier.workers.dev"
# Secret (set via `wrangler secret put CF_STREAM_TOKEN --env api-worker`):
#   CF_STREAM_TOKEN   API token with `Stream:Edit` permission

[[env.api-worker.kv_namespaces]]
binding    = "COMMENTS_KV"
id         = "bfaa55ab69d14b60b25dfe84d02ae53e"
preview_id = "99ded23b6b954c6e84115b4991ef1345"

[[env.api-worker.kv_namespaces]]
binding    = "RATE_LIMIT_KV"
id         = "0e9898f0ec2146f1bf3a8cfa9e3d57ed"
preview_id = "bc47b5da405d4de786536b763d9c4d76"

# Route bindings (active once the Pages /api/* rule is removed):
# [[env.api-worker.routes]]
# pattern   = "tokenomic.org/api/comments/*"
# zone_name = "tokenomic.org"
# [[env.api-worker.routes]]
# pattern   = "tokenomic.org/api/dashboard/*"
# zone_name = "tokenomic.org"
# [[env.api-worker.routes]]
# pattern   = "tokenomic.org/stream/*"
# zone_name = "tokenomic.org"

# ---------- web3-worker ----------
[env.web3-worker]
name = "tokenomic-web3"
main = "workers/web3-worker/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[env.web3-worker.observability]
enabled = true
head_sampling_rate = 1

[env.web3-worker.vars]
# First-party origins only — no multi-tenant wildcards (see api-worker note above).
ALLOWED_ORIGINS         = "https://tokenomic.org,https://www.tokenomic.org,https://*.tokenomic.org,https://tokenomic.guillaumelauzier.workers.dev,http://localhost:5000"
BASE_RPC_URL            = "https://mainnet.base.org"
BASE_CHAIN_ID           = "8453"
CLOUDFLARE_ETH_GATEWAY  = "https://cloudflare-eth.com"

# [[env.web3-worker.routes]]
# pattern   = "tokenomic.org/api/web3/*"
# zone_name = "tokenomic.org"

# ---------- site Worker -----------------------------------------------
# The `tokenomic` Worker (which serves the static Jekyll build + a tiny
# script handler for /__health and /__config) lives in its own config
# at workers/site-worker/wrangler.toml so wrangler can correctly
# resolve `main` and the assets directory:
#
#   cd workers/site-worker && wrangler deploy --config ./wrangler.toml
#
# That's required because wrangler v4 walks up to the nearest parent
# wrangler.toml when invoked without --config, which would re-read this
# file instead of the per-Worker one.
