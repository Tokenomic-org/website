name                = "tokenomic-api"
main                = "index.js"
compatibility_date  = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev         = true
keep_vars           = true

[observability]
enabled            = true
head_sampling_rate = 1

# Phase 7 — Workers Analytics Engine binding. Every request writes one
# data point (route, method, status, country, role, latency, bytes) so
# /admin/observability can chart per-route latency + error rate. The
# dataset name is duplicated as ANALYTICS_ENGINE_DATASET below so the
# admin endpoints can query it via the AE SQL API.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "tokenomic_api_requests"

# Phase 7 — Cron Trigger for the error-spike alerter. Runs every 5
# minutes; the handler in workers/api-worker/index.js#scheduled queries
# Workers Analytics Engine for recent 5xx counts and pages OPS_ALERT_EMAIL
# via MailChannels when the threshold is breached. Debounced via KV so a
# single incident pages once per 30 minutes.
[triggers]
crons = ["*/5 * * * *"]

[vars]
# First-party origins only. Multi-tenant wildcards (https://*.pages.dev,
# https://*.replit.dev, https://*.repl.co, https://*.workers.dev) must NEVER
# appear here because credentials:true CORS would let any attacker-controlled
# subdomain on those platforms steal cookie-authenticated responses. To add a
# specific staging Pages or Replit dev URL, list its exact hostname here.
ALLOWED_ORIGINS              = "https://tokenomic.org,https://www.tokenomic.org,https://*.tokenomic.org,https://tokenomic.guillaumelauzier.workers.dev,http://localhost:5000,http://127.0.0.1:5000"
# Domains accepted in the SIWE message header (line 1: "<domain> wants you to sign in...").
# First entry is the canonical/default; clients should prefer it via window.TOKENOMIC_SIWE_DOMAIN.
SIWE_DOMAIN                  = "tokenomic.org"
SIWE_DOMAINS                 = "tokenomic.org,www.tokenomic.org"
MAX_COMMENT_LEN              = "4000"
REQUIRE_WALLET               = "false"
STREAM_CUSTOMER_SUBDOMAIN    = ""
STREAM_MAX_DURATION_SECONDS  = "21600"
STREAM_ALLOWED_ORIGINS       = "https://tokenomic.org,https://tokenomic.guillaumelauzier.workers.dev"
# Phase 0: SIWE / chain config (public). SIWE_DOMAIN/SIWE_DOMAINS are
# defined above near ALLOWED_ORIGINS — TOML disallows duplicate keys in
# the same table, so they are not redeclared here.
BASE_RPC_URL                 = "https://mainnet.base.org"
BASE_SEPOLIA_RPC_URL         = "https://sepolia.base.org"
USDC_BASE                    = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
USDC_BASE_SEPOLIA            = "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
PLATFORM_TREASURY            = ""    # set via `wrangler secret put PLATFORM_TREASURY` if you do not want it public
# SubscriptionManager (Phase 1 contracts). When unset, the article paywall
# stays closed for everyone (conservative default). Set per environment to
# the deployed proxy/impl address on Base mainnet or Base Sepolia.
SUBSCRIPTION_MANAGER         = ""
SUBSCRIPTION_CHAIN_ID        = "8453"   # 8453=base, 84532=base-sepolia
# Phase 3a: SIWE-aware admin console.
#  - ADMIN_WALLETS   comma-separated lowercased EOAs that bypass on-chain role
#                    checks. Bootstrap / break-glass; keep this list short.
#  - ROLE_REGISTRY   deployed RoleRegistry address on the active chain.
#                    When unset, the on-chain reader returns the base
#                    ['learner'] role and admin gating falls back to
#                    ADMIN_WALLETS + the legacy profiles.roles JSON column.
ADMIN_WALLETS                = ""
ROLE_REGISTRY                = ""
ROLE_REGISTRY_CHAIN_ID       = "8453"
# Secrets (set via `wrangler secret put …`):
#   JWT_SECRET                       HS256 key for legacy /api/auth/login JWTs
#   SIWE_SECRET                      (optional) dedicated HMAC key for SIWE cookies; falls back to JWT_SECRET
#   CF_ACCOUNT_ID                    Cloudflare account id for Stream API
#   CF_STREAM_TOKEN                  `Stream:Edit` API token
#
# Phase 4 — Calendar OAuth (set in production via `wrangler secret put`,
# in development via Replit Secrets which the worker reads at runtime):
#   OAUTH_TOKEN_ENC_KEY              base64url-encoded 32 bytes — AES-GCM key
#                                    used to encrypt refresh tokens at rest
#   GOOGLE_OAUTH_CLIENT_ID           Google Cloud OAuth client id
#   GOOGLE_OAUTH_CLIENT_SECRET       Google Cloud OAuth client secret
#   MS_OAUTH_CLIENT_ID               Azure AD app (client) id
#   MS_OAUTH_CLIENT_SECRET           Azure AD client secret
#   MS_OAUTH_TENANT                  Azure AD tenant (or "common" for multi-tenant)
#   CALENDLY_OAUTH_CLIENT_ID         Calendly OAuth app client id
#   CALENDLY_OAUTH_CLIENT_SECRET     Calendly OAuth app client secret
#   CALENDLY_WEBHOOK_SIGNING_KEY     HMAC key for verifying webhook deliveries
#   PUBLIC_SITE_ORIGIN               (env var, not secret) e.g. https://tokenomic.org —
#                                    OAuth callback page targets this origin in
#                                    its postMessage. Defaults to the popup's own
#                                    origin which is correct for first-party flows.
#
# Phase 5 — Referrals & contact import:
#   TURNSTILE_SITE_KEY               Cloudflare Turnstile public site key (used in dashboard JS)
#   TURNSTILE_SECRET_KEY             Turnstile siteverify secret (set via wrangler secret)
#   INVITE_HMAC_KEY                  ≥32 byte secret used to HMAC-sign one-time invite tokens
#   MAIL_FROM                        e.g. "Tokenomic Invites <invites@tokenomic.org>"
#   MAIL_FROM_DOMAIN                 e.g. "tokenomic.org" — used for MailChannels DKIM block
#   MAIL_DKIM_SELECTOR               DKIM selector (default "mailchannels")
#   MAIL_DKIM_PRIVATE_KEY            base64 PKCS#8 private key (set via wrangler secret)
#   REFERRAL_REGISTRY                deployed ReferralRegistry address on the active chain.
#                                    When unset, the on-chain link prompt is suppressed
#                                    and /api/referrals/confirm-link returns 503.
REFERRAL_REGISTRY                = ""
REFERRAL_REGISTRY_CHAIN_ID       = "8453"   # 8453=base mainnet, 84532=base sepolia

# Phase 6 — Content infrastructure (Stream signed playback, R2, CF Images).
#
# Public vars:
#   COURSE_ACCESS_1155            ERC-1155 access NFT contract on Base. The
#                                 signed-playback endpoint reads
#                                 balanceOf(wallet, on_chain_course_id) > 0 to
#                                 grant lesson access. When unset, falls back
#                                 to the D1 `enrollments` table.
#   COURSE_ACCESS_CHAIN_ID        Chain id (8453 mainnet, 84532 sepolia).
#   CF_IMAGES_DELIVERY_HASH       Account hash from imagedelivery.net URLs.
#                                 Used to build variant URLs for persisted
#                                 image_ids (https://imagedelivery.net/<hash>/<id>/<variant>).
#
# Secrets (set via `wrangler secret put`):
#   CF_API_TOKEN                  combined Stream:Edit + Images:Edit token
#                                 (or use the per-product tokens below)
#   CF_STREAM_TOKEN               `Stream:Edit` API token
#   CF_IMAGES_TOKEN               `Images:Edit` API token
#   STREAM_WEBHOOK_SIGNING_SECRET HMAC secret published by CF Stream when
#                                 you register the webhook URL. Verifies
#                                 the `Webhook-Signature` header on /api/content/stream/webhook.
#   R2_URL_SIGNING_KEY            (optional) ≥32-byte secret used to sign
#                                 short-lived R2 GET URLs. Falls back to
#                                 SIWE_SECRET / JWT_SECRET when unset.
COURSE_ACCESS_1155               = ""
COURSE_ACCESS_CHAIN_ID           = "8453"
CF_IMAGES_DELIVERY_HASH          = ""
# Phase 6 — Playback gating policy (see content-infra.js):
#   "unset-only" (default) | "always" | "never"
ENROLLMENT_D1_FALLBACK           = "unset-only"

# Phase 7 — Observability + alerting.
#   ANALYTICS_ENGINE_DATASET   Name of the AE dataset (duplicate of the
#                              binding above so /admin/observability can
#                              build SQL queries). Required for the admin
#                              dashboard; the writeDataPoint() side
#                              works off the binding alone.
#   OPS_ALERT_EMAIL            Where error-spike alerts are routed via
#                              Cloudflare Email Routing. Configured at
#                              dashboard level; the Worker just reads
#                              this so the observability page can show
#                              "Alerts → <addr>".
ANALYTICS_ENGINE_DATASET         = "tokenomic_api_requests"
OPS_ALERT_EMAIL                  = ""
# Phase 7 — error-spike alerter (workers/api-worker/alerts.js).
#   ALERT_THRESHOLD_5XX_5M  Default 25. Above this many 5xx responses in
#                           a 5-minute window the alerter pages OPS_ALERT_EMAIL
#                           via MailChannels and stamps a 30-min debounce
#                           into RATE_LIMIT_KV so the same incident
#                           doesn't re-page on every Cron tick.
#   MAIL_FROM               From address on alert emails. Must be on a
#                           DKIM-configured domain.
#   DEV_MODE                "1" to also trust *.replit.dev / *.repl.co
#                           as credentialed CORS origins. Never set on
#                           production deploys.
#   CSP_REPORT_URL          (site-worker) URL for CSP violation reports
#                           during the legacy-template rewrite phase.
ALERT_THRESHOLD_5XX_5M           = "25"
MAIL_FROM                        = "alerts@tokenomic.org"
DEV_MODE                         = ""

[[r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "tokenomic-content"
preview_bucket_name = "tokenomic-content-preview"

# Phase 5 — Cloudflare Queue for outbound invite email delivery. The
# producer (POST /api/referrals/invite-batch) enqueues one message per
# recipient; the consumer (handleInviteQueueBatch in referrals.js,
# wired via the top-level queue() export in index.js) does the
# MailChannels send and updates the D1 invite row.
[[queues.producers]]
binding    = "INVITE_QUEUE"
queue      = "tkn-invites"

[[queues.consumers]]
queue                 = "tkn-invites"
max_batch_size        = 10
max_batch_timeout     = 5
max_retries           = 5
dead_letter_queue     = "tkn-invites-dlq"

[[kv_namespaces]]
binding    = "COMMENTS_KV"
id         = "bfaa55ab69d14b60b25dfe84d02ae53e"
preview_id = "99ded23b6b954c6e84115b4991ef1345"

[[kv_namespaces]]
binding    = "RATE_LIMIT_KV"
id         = "0e9898f0ec2146f1bf3a8cfa9e3d57ed"
preview_id = "bc47b5da405d4de786536b763d9c4d76"

[[d1_databases]]
binding       = "DB"
database_name = "tokenomic-db"
database_id   = "6c1e01cf-1e87-4419-b705-f8eec1935fe4"
# JWT_SECRET injected via: wrangler secret put JWT_SECRET

# Durable Objects — one ChatRoom instance per community
[[durable_objects.bindings]]
name       = "CHAT_ROOMS"
class_name = "ChatRoom"

[[migrations]]
tag                = "v1-chatroom"
new_sqlite_classes = ["ChatRoom"]
