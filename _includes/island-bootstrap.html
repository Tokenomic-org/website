<!-- Tokenomic island bootstrap -->
<link rel="stylesheet" href="/assets/islands/dist/tailwind.css" />
<script>
  // Flash-free dark-mode bootstrap. Reads tkn-theme from localStorage and
  // applies it before first paint so Tailwind dark variants are correct.
  (function () {
    try {
      var t = localStorage.getItem('tkn-theme');
      if (t !== 'light' && t !== 'dark') t = 'dark';
      var c = document.documentElement.classList;
      if (t === 'light') { c.add('theme-light'); c.remove('dark'); }
      else { c.remove('theme-light'); c.add('dark'); }
    } catch (e) {}
  })();
</script>
<!-- React + ReactDOM are bundled into each island IIFE. No CDN dependency. -->
<style>
  /* Floating dark-mode toggle for island-rendered pages. Lives outside the
     React tree so it works even if an island fails to hydrate. */
  .tk-theme-fab {
    position: fixed; right: 20px; bottom: 20px; z-index: 999;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgb(16,25,36); color: #ECF4FA;
    border: 1px solid rgb(36,52,70);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .15s ease, background .15s ease;
  }
  .tk-theme-fab:hover { transform: translateY(-1px); }
  .theme-light .tk-theme-fab { background: #ffffff; color: #0A1F29; border-color: #E4EAF0; }
</style>
<button id="tk-theme-fab" class="tk-theme-fab" type="button" aria-label="Toggle dark mode">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
  </svg>
</button>
<script>
  (function () {
    var btn = document.getElementById('tk-theme-fab');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var c = document.documentElement.classList;
      var nowLight = !c.contains('theme-light');
      if (nowLight) { c.add('theme-light'); c.remove('dark'); }
      else { c.remove('theme-light'); c.add('dark'); }
      try { localStorage.setItem('tkn-theme', nowLight ? 'light' : 'dark'); } catch (e) {}
      try { window.dispatchEvent(new CustomEvent('tkn-theme', { detail: nowLight ? 'light' : 'dark' })); } catch (e) {}
    });
  })();
</script>
