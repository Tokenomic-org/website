---
layout: default
title: Event
permalink: /event/
---

{% include header.html %}

<style>
.evd-wrap { max-width: 920px; margin: 110px auto 80px; padding: 0 20px; }
.evd-cover { width:100%; aspect-ratio: 21/9; background:#f1f5f9; border-radius:12px; overflow:hidden; margin-bottom:18px; }
.evd-cover img { width:100%; height:100%; object-fit:cover; }
.evd-title { font-size: 2rem; font-weight:800; color:#0A0F1A; margin:0 0 6px; line-height:1.15; }
.evd-host { color:#5a8299; font-size:0.95rem; margin-bottom:18px; }
.evd-meta-grid {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:14px;
    background:#f8fafc; border-radius:10px; padding:18px; margin-bottom:24px;
}
.evd-meta-grid > div .lbl { font-size:0.72rem; color:#5a8299; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px; }
.evd-meta-grid > div .val { font-size:0.95rem; color:#0A0F1A; font-weight:600; word-break:break-word; }
.evd-desc { font-size:1.02rem; line-height:1.7; color:#243447; }
.evd-desc h1, .evd-desc h2, .evd-desc h3 { color:#0A0F1A; margin: 1em 0 0.4em; }
.evd-desc p { margin:0.6em 0; }
.evd-desc ul, .evd-desc ol { padding-left:1.4em; margin:0.6em 0; }
.evd-desc a { color:#ff6000; }
.evd-cta {
    margin-top:28px; padding:20px; background:#0A0F1A; color:#fff; border-radius:12px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px;
}
.evd-cta .stat { font-size:0.85rem; color:rgba(255,255,255,0.7); }
.evd-cta .stat strong { color:#facc15; font-size:1.2rem; display:block; }
.evd-btn {
    display:inline-block; padding:11px 26px; border-radius:8px; font-weight:700; font-size:0.95rem;
    cursor:pointer; border:none; text-decoration:none;
}
.evd-btn-primary { background:#ff6000; color:#fff; }
.evd-btn-outline { background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.3); }
.evd-btn:disabled { opacity:0.6; cursor:not-allowed; }
.evd-pill { display:inline-block; padding:3px 10px; border-radius:14px; font-size:0.75rem; font-weight:600; margin-left:8px; vertical-align:middle; }
.evd-pill-going { background:#dcfce7; color:#15803d; }
.evd-pill-wait { background:#fef3c7; color:#a16207; }
.evd-pill-cancel { background:#fee2e2; color:#dc2626; }
.evd-status-banner { padding:14px 18px; border-radius:8px; margin-bottom:16px; font-weight:600; }
.evd-status-cancelled { background:#fee2e2; color:#991b1b; }
.evd-status-past { background:#e5e7eb; color:#374151; }
#evd-toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#0A0F1A; color:#fff; padding:12px 20px; border-radius:8px; font-size:0.9rem;
    box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:9999; display:none;
}
#evd-toast.error { background:#dc2626; }
</style>

<section class="evd-wrap">
    <div id="evd-loading" style="text-align:center;padding:80px 0;color:#5a8299;">Loading event…</div>
    <div id="evd-error" style="display:none;text-align:center;padding:80px 0;color:#dc2626;"></div>
    <div id="evd-content" style="display:none;">
        <div id="evd-status" style="display:none;"></div>
        <div id="evd-cover-host"></div>
        <h1 class="evd-title" id="evd-title"></h1>
        <div class="evd-host" id="evd-host"></div>

        <div class="evd-meta-grid">
            <div><div class="lbl">When</div><div class="val" id="evd-when"></div></div>
            <div id="evd-location-cell" style="display:none;"><div class="lbl">Location</div><div class="val" id="evd-location"></div></div>
            <div id="evd-meeting-cell" style="display:none;"><div class="lbl">Meeting Link</div><div class="val"><a id="evd-meeting" target="_blank" rel="noopener" style="color:#ff6000;word-break:break-all;"></a></div></div>
            <div><div class="lbl">Capacity</div><div class="val" id="evd-cap"></div></div>
        </div>

        <div class="evd-desc" id="evd-desc"></div>

        <div class="evd-cta">
            <div>
                <div class="stat"><strong id="evd-going-count">0</strong> people going</div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <span id="evd-my-pill"></span>
                <button id="evd-rsvp-btn" class="evd-btn evd-btn-primary">RSVP</button>
                <button id="evd-cancel-btn" class="evd-btn evd-btn-outline" style="display:none;">Cancel RSVP</button>
            </div>
        </div>
    </div>
</section>

<div id="evd-toast"></div>

{% include footer.html %}

<script src="/shared/assets/js/d1-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
<script>
(function() {
    var loadingEl = document.getElementById('evd-loading');
    var errorEl = document.getElementById('evd-error');
    var contentEl = document.getElementById('evd-content');
    var toastEl = document.getElementById('evd-toast');
    var rsvpBtn = document.getElementById('evd-rsvp-btn');
    var cancelBtn = document.getElementById('evd-cancel-btn');
    var current = null;

    function toast(t, err) {
        toastEl.textContent = t;
        toastEl.className = err ? 'error' : '';
        toastEl.style.display = 'block';
        setTimeout(function(){ toastEl.style.display = 'none'; }, 3500);
    }
    function fmtDate(s) {
        if (!s) return '';
        try {
            var d = new Date(s);
            return d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' })
                 + ' · ' + d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
        } catch (e) { return s; }
    }
    function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function renderMd(src) {
        if (!src) return '<p style="color:#9ca3af;">No description.</p>';
        if (window.marked && typeof window.marked.parse === 'function') {
            try {
                if (window.marked.setOptions) window.marked.setOptions({ breaks:true, gfm:true });
                var html = window.marked.parse(String(src));
                if (window.DOMPurify && typeof window.DOMPurify.sanitize === 'function') {
                    return window.DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
                }
            } catch (e) {}
        }
        return '<pre style="white-space:pre-wrap;">' + escapeHtml(src) + '</pre>';
    }

    function paint(ev, my_rsvp) {
        current = ev;
        document.getElementById('evd-title').textContent = ev.title;
        document.getElementById('evd-host').innerHTML = ev.host_name
            ? 'Hosted by <strong>' + escapeHtml(ev.host_name) + '</strong>'
            : 'Hosted by <code>' + escapeHtml(ev.host_wallet.slice(0,6) + '…' + ev.host_wallet.slice(-4)) + '</code>';

        document.getElementById('evd-when').textContent = fmtDate(ev.starts_at)
            + (ev.ends_at ? '  →  ' + fmtDate(ev.ends_at) : '');

        if (ev.location) {
            document.getElementById('evd-location-cell').style.display = '';
            document.getElementById('evd-location').textContent = ev.location;
        }
        if (ev.meeting_url && /^https?:\/\//i.test(ev.meeting_url)) {
            document.getElementById('evd-meeting-cell').style.display = '';
            var a = document.getElementById('evd-meeting');
            a.href = ev.meeting_url; a.textContent = ev.meeting_url;
        }
        document.getElementById('evd-cap').textContent = ev.capacity != null
            ? (ev.rsvp_count || 0) + ' / ' + ev.capacity + ' going'
            : 'Unlimited';

        document.getElementById('evd-going-count').textContent = ev.rsvp_count || 0;

        if (ev.cover_url && /^https?:\/\//i.test(ev.cover_url)) {
            document.getElementById('evd-cover-host').innerHTML =
                '<div class="evd-cover"><img src="'+escapeHtml(ev.cover_url)+'" alt="" /></div>';
        }
        document.getElementById('evd-desc').innerHTML = renderMd(ev.description);

        // Status banners
        var statusEl = document.getElementById('evd-status');
        var isPast = ev.starts_at && Date.parse(ev.starts_at) < Date.now();
        if (ev.status === 'cancelled') {
            statusEl.style.display = '';
            statusEl.className = 'evd-status-banner evd-status-cancelled';
            statusEl.textContent = 'This event was cancelled by the host.';
            rsvpBtn.disabled = true;
        } else if (isPast) {
            statusEl.style.display = '';
            statusEl.className = 'evd-status-banner evd-status-past';
            statusEl.textContent = 'This event has already taken place.';
            rsvpBtn.disabled = true;
        }

        // My RSVP pill + buttons
        var pillEl = document.getElementById('evd-my-pill');
        if (my_rsvp && my_rsvp.status !== 'cancelled') {
            var cls = my_rsvp.status === 'going' ? 'evd-pill-going' : 'evd-pill-wait';
            var label = my_rsvp.status === 'going' ? "You're going" : 'On waitlist';
            pillEl.innerHTML = '<span class="evd-pill ' + cls + '">' + label + '</span>';
            rsvpBtn.style.display = 'none';
            cancelBtn.style.display = '';
        } else {
            pillEl.innerHTML = '';
            rsvpBtn.style.display = '';
            cancelBtn.style.display = 'none';
            if (ev.capacity != null && (ev.rsvp_count || 0) >= ev.capacity) {
                rsvpBtn.textContent = 'Join Waitlist';
            } else {
                rsvpBtn.textContent = 'RSVP';
            }
        }
    }

    rsvpBtn.addEventListener('click', async function() {
        if (!window.TokenomicSupabase) return;
        if (!TokenomicSupabase.isSignedIn()) {
            try { await TokenomicSupabase.signIn(); }
            catch (e) { toast('Connect your wallet to RSVP', true); return; }
        }
        rsvpBtn.disabled = true;
        try {
            var res = await TokenomicSupabase.rsvpEvent(current.id, {});
            paint(res.event || current, res.rsvp);
            toast(res.rsvp && res.rsvp.status === 'waitlist' ? 'Added to the waitlist.' : "You're going! 🎉");
        } catch (e) {
            toast((e.body && e.body.error) || e.message || 'RSVP failed', true);
            rsvpBtn.disabled = false;
        }
    });

    cancelBtn.addEventListener('click', async function() {
        if (!confirm('Cancel your RSVP for "' + current.title + '"?')) return;
        cancelBtn.disabled = true;
        try {
            await TokenomicSupabase.cancelRsvp(current.id);
            // Refetch to get fresh count + waitlist promotion state.
            var ev = await TokenomicSupabase.getEvent(current.slug || current.id);
            paint(ev.event, ev.my_rsvp);
            toast('RSVP cancelled.');
        } catch (e) {
            toast((e.body && e.body.error) || e.message || 'Failed to cancel', true);
            cancelBtn.disabled = false;
        }
    });

    (async function load() {
        var qs = new URLSearchParams(window.location.search);
        var slug = qs.get('slug') || qs.get('id');
        if (!slug) {
            loadingEl.style.display = 'none';
            errorEl.style.display = ''; errorEl.textContent = 'No event specified.';
            return;
        }
        try {
            var data = await TokenomicSupabase.getEvent(slug);
            if (!data || !data.event) throw new Error('Event not found');
            loadingEl.style.display = 'none';
            contentEl.style.display = '';
            paint(data.event, data.my_rsvp);
            document.title = data.event.title + ' | Tokenomic';
        } catch (e) {
            loadingEl.style.display = 'none';
            errorEl.style.display = ''; errorEl.textContent = (e.message || 'Failed to load event');
        }
    })();
})();
</script>
