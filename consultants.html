<section class="services-section-four" style="padding:80px 0 60px;">
    <div class="auto-container">
        <div class="sec-title centered">
            <h2>Our Consultants</h2>
            <div class="lower-text">Community-approved DeFi consultants available for booking. Each consultant has been vetted through the Tokenomic community and brings deep domain expertise.</div>
        </div>

        <div id="consultants-grid" class="row clearfix">
            <div class="col-12 text-center" id="consultants-loading">
                <p style="color:#5a8299;padding:40px 0;">Loading consultants...</p>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/assets/js/supabase-client.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
    TokenomicSupabase.init();
    const consultants = await TokenomicSupabase.getConsultants();
    const grid = document.getElementById('consultants-grid');
    const loading = document.getElementById('consultants-loading');
    if (loading) loading.remove();

    if (!consultants || consultants.length === 0) {
        grid.innerHTML = '<div class="col-12 text-center"><p style="color:#5a8299;padding:40px 0;">No approved consultants yet. Check back soon.</p></div>';
        return;
    }

    consultants.forEach(function(con) {
        const initials = con.display_name ? con.display_name.split(' ').map(function(n){return n[0]}).join('') : '?';
        const stars = '★'.repeat(Math.floor(con.rating || 0)) + (con.rating % 1 >= 0.5 ? '½' : '');

        const card = document.createElement('div');
        card.className = 'col-lg-4 col-md-6 col-sm-12';
        card.style.marginBottom = '30px';
        card.innerHTML = '<div style="background:#fff;border-radius:12px;padding:30px;box-shadow:0 4px 20px rgba(0,31,41,0.08);height:100%;display:flex;flex-direction:column;">' +
            '<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">' +
                '<div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#3301c6,#01ccdd);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:700;flex-shrink:0;">' + initials + '</div>' +
                '<div>' +
                    '<h4 style="margin:0 0 4px;font-size:1.1rem;color:#001f29;">' + con.display_name + '</h4>' +
                    '<span style="color:#ff6000;font-size:0.85rem;font-weight:600;">' + (con.specialty || 'DeFi Consulting') + '</span>' +
                '</div>' +
            '</div>' +
            '<p style="color:#5a8299;font-size:0.9rem;margin-bottom:16px;flex-grow:1;">' + (con.bio || '') + '</p>' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
                '<div><span style="color:#ff8f00;font-size:1rem;">' + stars + '</span> <span style="color:#5a8299;font-size:0.8rem;">' + (con.rating || 0) + '/5 (' + (con.sessions || 0) + ' sessions)</span></div>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;align-items:center;background:#f8fafb;border-radius:8px;padding:12px 16px;margin-bottom:16px;">' +
                '<div><span style="color:#5a8299;font-size:0.8rem;">30 min</span><br><strong style="color:#00a651;">$' + (con.rate_30 || 0) + '</strong></div>' +
                '<div style="border-left:1px solid #e0e6ea;padding-left:16px;"><span style="color:#5a8299;font-size:0.8rem;">60 min</span><br><strong style="color:#00a651;">$' + (con.rate_60 || 0) + '</strong></div>' +
                '<div style="border-left:1px solid #e0e6ea;padding-left:16px;"><span style="color:#5a8299;font-size:0.8rem;">USDC on Base</span><br><strong style="color:#001f29;font-size:0.8rem;">90/5/5 split</strong></div>' +
            '</div>' +
            '<a href="/dashboard-bookings/" class="theme-btn btn-style-one" style="text-align:center;padding:10px 20px;font-size:0.85rem;border-radius:8px;display:block;">Book Consultation</a>' +
        '</div>';
        grid.appendChild(card);
    });
});
</script>
