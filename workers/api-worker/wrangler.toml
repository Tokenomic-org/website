name                = "tokenomic-api"
main                = "index.js"
compatibility_date  = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev         = true
keep_vars           = true

[observability]
enabled            = true
head_sampling_rate = 1

[vars]
ALLOWED_ORIGINS              = "https://tokenomic.org,https://*.tokenomic.org,https://*.pages.dev,https://tokenomic.guillaumelauzier.workers.dev,https://*.replit.dev,https://*.repl.co,http://localhost:5000"
MAX_COMMENT_LEN              = "4000"
REQUIRE_WALLET               = "false"
STREAM_CUSTOMER_SUBDOMAIN    = ""
STREAM_MAX_DURATION_SECONDS  = "21600"
STREAM_ALLOWED_ORIGINS       = "https://tokenomic.org,https://tokenomic.guillaumelauzier.workers.dev"
# Phase 0: SIWE / chain config (public)
SIWE_DOMAIN                  = "tokenomic.org"
BASE_RPC_URL                 = "https://mainnet.base.org"
BASE_SEPOLIA_RPC_URL         = "https://sepolia.base.org"
USDC_BASE                    = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
USDC_BASE_SEPOLIA            = "0x036CbD53842c5426634e7929541eC2318f3dCF7e"
PLATFORM_TREASURY            = ""    # set via `wrangler secret put PLATFORM_TREASURY` if you do not want it public
# Secrets (set via `wrangler secret put …`):
#   JWT_SECRET           HS256 key for legacy /api/auth/login JWTs
#   SIWE_SECRET          (optional) dedicated HMAC key for SIWE cookies; falls back to JWT_SECRET
#   CF_ACCOUNT_ID        Cloudflare account id for Stream API
#   CF_STREAM_TOKEN      `Stream:Edit` API token

[[kv_namespaces]]
binding    = "COMMENTS_KV"
id         = "bfaa55ab69d14b60b25dfe84d02ae53e"
preview_id = "99ded23b6b954c6e84115b4991ef1345"

[[kv_namespaces]]
binding    = "RATE_LIMIT_KV"
id         = "0e9898f0ec2146f1bf3a8cfa9e3d57ed"
preview_id = "bc47b5da405d4de786536b763d9c4d76"

[[d1_databases]]
binding       = "DB"
database_name = "tokenomic-db"
database_id   = "6c1e01cf-1e87-4419-b705-f8eec1935fe4"
# JWT_SECRET injected via: wrangler secret put JWT_SECRET

# Durable Objects — one ChatRoom instance per community
[[durable_objects.bindings]]
name       = "CHAT_ROOMS"
class_name = "ChatRoom"

[[migrations]]
tag                = "v1-chatroom"
new_sqlite_classes = ["ChatRoom"]
