---
layout: default
title: Learn
permalink: /learn/
---

{% include header.html %}

<style>
.learn-hero { padding: 140px 0 0; background: #fff; }
.learn-hero .hero-inner { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-bottom: 0; }
.learn-hero h1 { font-size: 38px; font-weight: 800; color: #001f29; margin: 0; line-height: 1.2; }
.learn-hero .hero-subtitle { color: #5a8299; font-size: 16px; margin-top: 8px; }
.learn-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.learn-tabs .tab-btn { padding: 8px 22px; border-radius: 30px; border: 1.5px solid #e0e4e8; background: #fff; color: #5a8299; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
.learn-tabs .tab-btn:hover { border-color: #001f29; color: #001f29; }
.learn-tabs .tab-btn.active { background: #001f29; color: #fff; border-color: #001f29; }
.learn-divider { height: 2px; background: #f0f0f0; margin-top: 28px; }

.learn-page { padding: 40px 0 40px; background: #fff; }
.learn-page .category-section { margin-bottom: 60px; }
.learn-page .category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px; }
.learn-page .category-header h3 { font-size: 28px; font-weight: 700; color: #001f29; margin: 0; }
.learn-page .view-all-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 22px; border-radius: 30px; background: #fff8e1; color: #001f29; font-size: 14px; font-weight: 600; text-decoration: none; border: 1.5px solid #ffe082; transition: all 0.2s; }
.learn-page .view-all-btn:hover { background: #ffe082; }
.learn-page .article-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
@media (max-width: 991px) { .learn-page .article-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 575px) { .learn-page .article-grid { grid-template-columns: 1fr; } }
.learn-page .article-card { background: #fff; border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
.learn-page .article-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
.learn-page .article-card .card-image { position: relative; width: 100%; aspect-ratio: 16/10; overflow: hidden; border-radius: 12px; }
.learn-page .article-card .card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
.learn-page .article-card:hover .card-image img { transform: scale(1.05); }
.learn-page .article-card .card-meta { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 12px; color: #5a8299; text-transform: uppercase; letter-spacing: 0.5px; }
.learn-page .article-card .card-meta .cat-tag { display: inline-block; padding: 3px 12px; background: #f5f5f5; border-radius: 20px; font-weight: 600; color: #001f29; font-size: 11px; }
.learn-page .article-card .card-title { font-size: 17px; font-weight: 600; color: #001f29; margin-top: 10px; line-height: 1.4; }
.learn-page .article-card .card-title a { color: inherit; text-decoration: none; }
.learn-page .article-card .card-author { font-size: 13px; color: #5a8299; margin-top: 8px; }
.learn-page .authors-section { padding: 40px 0; border-top: 1.5px solid #f0f0f0; border-bottom: 1.5px solid #f0f0f0; margin-bottom: 40px; }
.learn-page .authors-inner { display: flex; align-items: center; justify-content: space-between; }
.learn-page .authors-inner h3 { font-size: 26px; font-weight: 700; color: #001f29; margin: 0; }
.learn-page .authors-avatars { display: flex; align-items: center; }
.learn-page .authors-avatars .author-avatar { width: 56px; height: 56px; border-radius: 50%; background: #e8eef2; border: 3px solid #fff; margin-left: -12px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #001f29; font-size: 18px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.learn-page .authors-avatars .author-avatar:first-child { margin-left: 0; }
.learn-page .authors-avatars .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.learn-page .authors-link { margin-left: 20px; }
.learn-page .authors-link a { color: #ff6000; font-weight: 600; text-decoration: none; font-size: 14px; }
.learn-page .authors-link a:hover { text-decoration: underline; }
.learn-page .cta-write { text-align: center; padding: 50px 20px; background: linear-gradient(135deg, #001f29 0%, #003d52 100%); border-radius: 16px; margin-bottom: 40px; }
.learn-page .cta-write h3 { color: #fff; font-size: 24px; margin-bottom: 10px; }
.learn-page .cta-write p { color: #8ab4c9; font-size: 15px; margin-bottom: 24px; }
.learn-page .cta-write .cta-btn { display: inline-block; padding: 12px 32px; background: #ff6000; color: #fff; border-radius: 30px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
.learn-page .cta-write .cta-btn:hover { background: #e55500; }
.learn-page .loading-state { text-align: center; padding: 60px 0; color: #5a8299; font-size: 16px; }
</style>

<section class="learn-hero">
    <div class="auto-container">
        <div class="hero-inner">
            <div>
                <h1>Learn</h1>
                <p class="hero-subtitle">Explore DeFi education articles from our expert contributors</p>
            </div>
            <div class="learn-tabs" id="learn-tabs">
                <a href="#" class="tab-btn active" data-cat="all">All</a>
                <a href="#" class="tab-btn" data-cat="Strategy">Strategy</a>
                <a href="#" class="tab-btn" data-cat="Technical">Technical</a>
                <a href="#" class="tab-btn" data-cat="Market">Market</a>
            </div>
        </div>
        <div class="learn-divider"></div>
    </div>
</section>

<section class="learn-page">
    <div class="auto-container">
        <div class="loading-state" id="learn-loading">Loading articles...</div>
        <div id="learn-content" style="display:none;"></div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared/assets/js/supabase-client.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
    TokenomicSupabase.init();

    const articles = await TokenomicSupabase.getArticles();
    const authors = await TokenomicSupabase.getAuthors();

    var activeFilter = 'all';

    function renderContent(filter) {
        var categories = {};
        articles.forEach(function(a) {
            if (!categories[a.category]) categories[a.category] = [];
            categories[a.category].push(a);
        });

        var html = '';

        html += '<div class="authors-section"><div class="authors-inner">';
        html += '<h3>Meet our authors</h3>';
        html += '<div style="display:flex;align-items:center;">';
        html += '<div class="authors-avatars">';
        authors.forEach(function(author) {
            var initials = author.display_name.split(' ').map(function(n){ return n[0]; }).join('');
            var colors = ['#ff6000','#2196F3','#4CAF50','#9C27B0','#F44336','#00BCD4'];
            var colorIdx = author.display_name.length % colors.length;
            if (author.avatar_url) {
                html += '<div class="author-avatar"><img src="' + author.avatar_url + '" alt="' + author.display_name + '"></div>';
            } else {
                html += '<div class="author-avatar" style="background:' + colors[colorIdx] + ';color:#fff;">' + initials + '</div>';
            }
        });
        html += '</div>';
        html += '<div class="authors-link"><a href="/educators/">View all &rsaquo;</a></div>';
        html += '</div></div></div>';

        var categoryOrder = ['Strategy', 'Technical', 'Market'];
        categoryOrder.forEach(function(cat) {
            if (filter !== 'all' && filter !== cat) return;
            var catArticles = categories[cat];
            if (!catArticles || catArticles.length === 0) return;

            html += '<div class="category-section">';
            html += '<div class="category-header">';
            html += '<h3>' + cat + '</h3>';
            html += '</div>';
            html += '<div class="article-grid">';

            var showAll = (filter !== 'all');
            var limit = showAll ? catArticles.length : 3;
            catArticles.slice(0, limit).forEach(function(article) {
                var date = new Date(article.published_at);
                var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                var dateStr = date.getDate().toString().padStart(2,'0') + ' ' + months[date.getMonth()].toUpperCase() + ', ' + date.getFullYear();
                var authorName = article.profiles ? article.profiles.display_name : 'Tokenomic Team';
                var link = '/learn/' + article.slug;

                html += '<div class="article-card" onclick="window.location.href=\'' + link + '\'">';
                html += '<div class="card-image"><img src="' + article.image_url + '" alt="' + article.title.replace(/'/g, '') + '"></div>';
                html += '<div class="card-meta"><span class="cat-tag">' + article.category + '</span><span>' + dateStr + '</span></div>';
                html += '<div class="card-title"><a href="' + link + '">' + article.title + '</a></div>';
                html += '<div class="card-author">By ' + authorName + '</div>';
                html += '</div>';
            });

            html += '</div></div>';
        });

        html += '<div class="cta-write">';
        html += '<h3>Share Your Expertise</h3>';
        html += '<p>Educators and consultants can publish articles directly from their dashboard.</p>';
        html += '<a href="#" class="cta-btn wallet-login-btn" onclick="TokenomicWallet.connect(); return false;">Connect Wallet to Write</a>';
        html += '<a href="/dashboard-articles/" class="cta-btn wallet-logged-in-btn" style="display:none;">Go to Article Studio</a>';
        html += '</div>';

        document.getElementById('learn-content').innerHTML = html;
        document.getElementById('learn-content').style.display = 'block';
        document.getElementById('learn-loading').style.display = 'none';
    }

    renderContent('all');

    document.getElementById('learn-tabs').addEventListener('click', function(e) {
        var btn = e.target.closest('.tab-btn');
        if (!btn) return;
        e.preventDefault();
        var cat = btn.getAttribute('data-cat');
        activeFilter = cat;
        var tabs = document.querySelectorAll('.learn-tabs .tab-btn');
        for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
        btn.classList.add('active');
        renderContent(cat);
        document.querySelector('.learn-page').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
});
</script>
