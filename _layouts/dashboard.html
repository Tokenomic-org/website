<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Tokenomic - {{ page.title }}</title>
        <link href="/assets/css/bootstrap.css" rel="stylesheet" />
        <link href="/assets/css/style.css" rel="stylesheet" />
        <link href="/assets/css/responsive.css" rel="stylesheet" />
        <link href="/assets/css/dashboard.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link rel="shortcut icon" href="/assets/images/favicon.png" type="image/x-icon" />
        <link rel="icon" href="/assets/images/favicon.png" type="image/x-icon" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=2.0,minimum-scale=1.0" />
        {% include google_analytics.html %}
        <style>
            .header-style-two { top: 0; background: #0A0F1A; }
            .dashboard-section { padding-top: 100px !important; }
            .main-menu .navigation > li { margin-right: 20px; }
            .main-menu .navigation > li > a { font-size: 15px; }
        </style>
    </head>
    <body>
        <div class="page-wrapper">
            {% include header.html %}
            {{ content }}
            {% include footer.html %}
        </div>
        <div class="scroll-to-top scroll-to-target" data-target="html"><span class="flaticon-up-arrow"></span></div>
        <script src="/assets/js/jquery.js"></script>
        <script src="/assets/js/popper.min.js"></script>
        <script src="/assets/js/bootstrap.min.js"></script>
        <script src="/assets/js/jquery-ui.js"></script>
        <script src="/assets/js/jquery.fancybox.js"></script>
        <script src="/assets/js/owl.js"></script>
        <script src="/assets/js/scrollbar.js"></script>
        <script src="/assets/js/knob.js"></script>
        <script src="/assets/js/paroller.js"></script>
        <script src="/assets/js/tilt.js"></script>
        <script src="/assets/js/isotope.js"></script>
        <script src="/assets/js/appear.js"></script>
        <script src="/assets/js/wow.js"></script>
        <script src="/assets/js/custom-script.js"></script>
        <script src="/shared/assets/js/supabase-client.js"></script>
        <script src="/shared/assets/js/profile-photo.js"></script>
        <script src="/shared/assets/js/web3-wallet.js"></script>
        <script src="/assets/js/simple-jekyll-search.min.js"></script>
        <script src="/shared/assets/js/site-search.js"></script>
        <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js"></script>
        <script>
        (function() {
            function initMobileSidebar() {
                if (window.innerWidth > 991) return;
                var sidebarCol = document.querySelector('.dashboard-sidebar')
                    ? document.querySelector('.dashboard-sidebar').parentElement
                    : null;
                if (!sidebarCol) return;

                sidebarCol.classList.add('dashboard-sidebar-col');

                var contentCol = sidebarCol.nextElementSibling;
                if (contentCol) contentCol.classList.add('dashboard-content-col');

                var sidebar = sidebarCol.querySelector('.dashboard-sidebar');

                var closeBtn = document.createElement('button');
                closeBtn.className = 'sidebar-close-btn';
                closeBtn.innerHTML = '<i class="fas fa-times"></i>';
                closeBtn.setAttribute('aria-label', 'Close menu');
                sidebar.insertBefore(closeBtn, sidebar.firstChild);

                var overlay = document.createElement('div');
                overlay.className = 'sidebar-overlay';
                document.body.appendChild(overlay);

                var toggleBtn = document.createElement('button');
                toggleBtn.className = 'sidebar-toggle-btn';
                toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                toggleBtn.setAttribute('aria-label', 'Open menu');
                document.body.appendChild(toggleBtn);

                function openSidebar() {
                    sidebarCol.classList.add('open');
                    overlay.classList.add('visible');
                    toggleBtn.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
                function closeSidebar() {
                    sidebarCol.classList.remove('open');
                    overlay.classList.remove('visible');
                    toggleBtn.classList.remove('open');
                    document.body.style.overflow = '';
                }

                toggleBtn.addEventListener('click', openSidebar);
                closeBtn.addEventListener('click', closeSidebar);
                overlay.addEventListener('click', closeSidebar);

                var navLinks = sidebar.querySelectorAll('.dash-nav-item');
                for (var i = 0; i < navLinks.length; i++) {
                    navLinks[i].addEventListener('click', closeSidebar);
                }

                window.addEventListener('resize', function() {
                    if (window.innerWidth > 991) closeSidebar();
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initMobileSidebar);
            } else {
                initMobileSidebar();
            }
        })();
        </script>
    </body>
</html>
